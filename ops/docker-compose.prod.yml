# =============================================================================
# Construct Server — Production Docker Compose
# =============================================================================
# Architecture:
#   Caddy — TLS termination (Let's Encrypt ACME), HTTP/3, JWT validation,
#           gRPC routing to Rust microservices (replaces Traefik + Envoy).
#     ├→ caddy:8080 (internal h2c, no TLS — used by gateway)
#     └→ caddy:443  (external TLS, HTTP/2 + HTTP/3)
#
# Note: the standalone obfs4 relay (relay-ams / construct-relay) was retired
# 2026-06-12 in favour of veil-front (separate construct-veil deployment). The
# gateway still embeds a legacy obfs4 relay on :9443 (see ICE_* below) — slated
# for removal once clients are off obfs4.
#
# Secrets management:
#   /opt/construct/secrets/app.env — manually maintained on the server.
#   Template: ops/secrets.example.env
#   Services read secrets directly from this file (no vault-agent).
#
# DNS: A record ams.konstruct.cc → VPS IP (no Cloudflare proxy)
# TLS: Caddy auto-obtains Let's Encrypt certs via TLS-ALPN-01
#
# Data layer:
#   PostgreSQL 16 + Redis 7 run as services in this compose file (single-VPS mode).
#   Data is persisted in named Docker volumes: postgres-data, redis-data.
#   No ports are exposed to the host — services connect via the internal network.
#   DATABASE_URL and REDIS_URL in app.env must use Docker hostnames:
#     DATABASE_URL=postgresql://construct:PASSWORD@postgres:5432/construct
#     REDIS_URL=redis://:PASSWORD@redis:6379
#   POSTGRES_PASSWORD and REDIS_PASSWORD are read from the .env file (same file
#   used for IMAGE_TAG etc). Add them to /opt/construct/.env on the server.
#
# First-time setup (run from REPO ROOT):
#   1. cp ops/secrets.example.env /opt/construct/secrets/app.env
#   2. nano /opt/construct/secrets/app.env   # fill in all values
#   3. chmod 600 /opt/construct/secrets/app.env
#   4. cp ops/.env.example .env && nano .env
#   5. docker compose -f ops/docker-compose.prod.yml --env-file .env up -d
#
# Redeploy after code changes:
#   git pull && docker compose -f ops/docker-compose.prod.yml --env-file .env up -d
# =============================================================================

name: construct

services:
  # ─── Data Layer ───────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: construct-postgres
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c max_connections=50
      -c wal_level=minimal
      -c max_wal_senders=0
      -c checkpoint_completion_target=0.9
      -c maintenance_work_mem=64MB
      -c random_page_cost=1.1
    environment:
      POSTGRES_DB: construct
      POSTGRES_USER: construct
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U construct -d construct"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: construct-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Caddy (TLS + gRPC routing) ───────────────────────────────────────────
  # Replaces Traefik (TLS + Let's Encrypt) + Envoy (gRPC routing + JWT authn).
  # Vanilla caddy:alpine — no JWT plugin. Each service validates JWT itself.
  #
  # Caddyfile: ops/Caddyfile
  #   - :80      → redirect to HTTPS
  #   - :443     → TLS (HTTP/2), route h2c to upstreams
  #   - :8080    → plain h2c for gateway proxy + quic transport

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443" # TCP — TLS/HTTP2
    # UDP 443 is claimed by construct-transport (SALAMANDER obfuscated QUIC).
    # Caddy native HTTP/3 is not used — clients use SALAMANDER-QUIC instead.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data # Let's Encrypt certs + OCSP staples
    depends_on:
      - identity
      - messaging
      - signaling
      - group
    networks:
      - internal

  # ─── Core Services ─────────────────────────────────────────────────────────
  # All services:
  #   - Use env_file from Vault-populated /secrets/app.env (via volume mount)
  #   - Only non-secret env vars (PORT, RUST_LOG, INSTANCE_DOMAIN) set here
  #   - Read secrets from /opt/construct/secrets/app.env (managed manually on server)

  # auth-service + user-service + invite merged into identity-service (2026-06-30)
  identity:
    image: ghcr.io/konstruct-msg/construct-server:${IMAGE_TAG:-0.15.0}
    command: /usr/local/bin/identity-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: /opt/construct/secrets/app.env # managed manually: see ops/secrets.example.env
        required: true
    environment:
      PORT: "8081"
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: identity
      INSTANCE_DOMAIN: ${INSTANCE_DOMAIN}
      APNS_ENABLED: ${APNS_ENABLED:-true}
      APNS_ENVIRONMENT: ${APNS_ENVIRONMENT:-production}
      APNS_KEY_PATH: ${APNS_KEY_PATH:-/secrets/AuthKey_TKYQ5KVW7P.p8}
      MAX_MESSAGES_PER_HOUR: ${MAX_MESSAGES_PER_HOUR:-1000}
      MESSAGE_TTL_DAYS: ${MESSAGE_TTL_DAYS:-7}
      DELIVERY_ACK_MODE: ${DELIVERY_ACK_MODE:-at_least_once}
      DELIVERY_EXPIRY_DAYS: ${DELIVERY_EXPIRY_DAYS:-7}
      DELIVERY_QUEUE_PREFIX: ${DELIVERY_QUEUE_PREFIX:-delivery}
      OFFLINE_QUEUE_PREFIX: ${OFFLINE_QUEUE_PREFIX:-offline}
      ONLINE_CHANNEL: ${ONLINE_CHANNEL:-online}
      ICE_ENABLED: ${ICE_ENABLED:-true}
      # ICE_SERVER_KEY, USERNAME_HMAC_SECRET, CONTACT_HMAC_SECRET come from env_file
      # (app.env). Do NOT re-list as ${VAR} — an unset interpolation blanks them.
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://messaging:50053}
      # SERVER_SIGNING_KEY + TOKEN_ISSUER_KEY come from env_file (app.env). Do NOT list
      # them here: an interpolated ${VAR} that is unset silently overrides env_file with
      # an empty string (identity then logs "Seed must be 32 bytes, got 0" / "TOKEN_ISSUER_KEY
      # must be 64 hex chars"). Same footgun already fixed for the VEIL keys below.
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal

  messaging:
    image: ghcr.io/konstruct-msg/construct-server:${IMAGE_TAG:-0.15.0}
    command: /usr/local/bin/messaging-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: /opt/construct/secrets/app.env
        required: true
    environment:
      PORT: "8083"
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: messaging
      INSTANCE_DOMAIN: ${INSTANCE_DOMAIN}
      MAX_MESSAGES_PER_HOUR: ${MAX_MESSAGES_PER_HOUR:-1000}
      MESSAGE_TTL_DAYS: ${MESSAGE_TTL_DAYS:-7}
      DELIVERY_QUEUE_PREFIX: ${DELIVERY_QUEUE_PREFIX:-delivery}
      APNS_ENABLED: ${APNS_ENABLED:-true}
      APNS_ENVIRONMENT: ${APNS_ENVIRONMENT:-production}
      APNS_KEY_PATH: ${APNS_KEY_PATH:-/secrets/AuthKey_TKYQ5KVW7P.p8}
      # CONTACT_HMAC_SECRET comes from env_file (app.env) — do NOT re-list as ${VAR}.
      MSG_STEALTH_TOKEN_POLICY: ${MSG_STEALTH_TOKEN_POLICY:-warn}
      # SERVER_SIGNING_KEY + TOKEN_ISSUER_KEY come from env_file (app.env). Do NOT list
      # them here: an unset interpolated ${VAR} silently overrides env_file with an empty
      # string, breaking token-encryption seal/open and VOPRF redemption. See identity above.
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal

  key:
    image: ghcr.io/konstruct-msg/construct-server:${IMAGE_TAG:-0.15.0}
    command: /usr/local/bin/key-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: /opt/construct/secrets/app.env
        required: true
    environment:
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: key
      INSTANCE_DOMAIN: ${INSTANCE_DOMAIN}
      # USERNAME_HMAC_SECRET comes from env_file (app.env) — do NOT re-list as ${VAR}.
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal

  # VEIL-front capability issuer. Signs per-user access capabilities that relays
  # validate offline. VEIL_ISSUER_SEED is the issuer Ed25519 seed (SECRET — keep in
  # app.env, never echo); its pubkey must equal the app pin AND the relay --issuer-pubkey.
  veil:
    image: ghcr.io/konstruct-msg/construct-server:${IMAGE_TAG:-0.15.0}
    command: /usr/local/bin/veil-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: /opt/construct/secrets/app.env
        required: true
    environment:
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: veil
      INSTANCE_DOMAIN: ${INSTANCE_DOMAIN}
      VEIL_GRPC_BIND_ADDRESS: "[::]:50056"
      # VEIL_ISSUER_SEED + VEIL_RELAY_* come from env_file (app.env). Do NOT list them
      # here as ${VEIL_*}: compose would substitute from the project .env (not app.env),
      # and an unset value silently overrides env_file with an empty string.
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal

  media:
    image: ghcr.io/konstruct-msg/construct-server:${IMAGE_TAG:-0.15.0}
    command: /usr/local/bin/media-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: /opt/construct/secrets/app.env
        required: true
    environment:
      PORT: "8087"
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: media
      INSTANCE_DOMAIN: ${INSTANCE_DOMAIN}
      MEDIA_PUBLIC_HOST: ${INSTANCE_DOMAIN}
      # Explicit storage path on a named volume. Without this the service wrote to
      # ./media_storage INSIDE the container — every image bump / force-recreate wiped
      # all media well before the 7-day MEDIA_FILE_TTL_SECONDS retention (observed
      # 2026-07-15: <7d-old object gone after the 07-14 redeploy).
      MEDIA_STORAGE_DIR: /data/media
    volumes:
      - /opt/construct/secrets:/secrets:ro
      - media-data:/data/media
    networks:
      - internal

  # Combined MLS + Channel service (merged 2026-06)
  group:
    image: ghcr.io/konstruct-msg/construct-server:${IMAGE_TAG:-0.15.0}
    command: /usr/local/bin/group-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: /opt/construct/secrets/app.env
        required: true
    environment:
      PORT: "8097"
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: group
      INSTANCE_DOMAIN: ${INSTANCE_DOMAIN}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://messaging:50053}
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal

  signaling:
    image: ghcr.io/konstruct-msg/construct-server:${IMAGE_TAG:-0.15.0}
    command: /usr/local/bin/signaling-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: /opt/construct/secrets/app.env
        required: true
    environment:
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: signaling
      INSTANCE_DOMAIN: ${INSTANCE_DOMAIN}
      PORT: "50060"
      METRICS_PORT: "8091"
      # CONTACT_HMAC_SECRET + TURN_SECRET come from env_file (app.env) — do NOT re-list
      # as ${VAR} (unset interpolation blanks them, breaking HMAC + TURN credentials).
      TURN_HOSTS: ${TURN_HOSTS:-turn.ams.konstruct.cc,turn.msk.konstruct.cc}
      TURN_CREDENTIALS_TTL_SECONDS: ${TURN_CREDENTIALS_TTL_SECONDS:-3600}
      NOTIFICATION_GRPC_ENDPOINT: "http://messaging:50053"
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal

  gateway:
    image: ghcr.io/konstruct-msg/construct-server:${IMAGE_TAG:-0.15.0}
    command: /usr/local/bin/gateway
    restart: unless-stopped
    env_file:
      - path: /opt/construct/secrets/app.env
        required: true
    environment:
      PORT: "3000"
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      SERVICE_NAME: gateway
      # SERVER_SIGNING_KEY + ICE_SERVER_KEY come from env_file (app.env). Do NOT re-list
      # as ${VAR}: an unset interpolation blanked SERVER_SIGNING_KEY, so the gateway
      # derived+published a bogus token_encryption_key from an empty seed.
      INSTANCE_DOMAIN: ${INSTANCE_DOMAIN}
      ICE_ENABLED: ${ICE_ENABLED:-true}
      ICE_UPSTREAM: "caddy:8080"
      # Relay addresses advertised in /.well-known/construct-server.
      # Port 443 = TLS-wrapped obfs4 (Caddy terminates TLS).
      # Add more relays as comma-separated list: "veil.ams.konstruct.cc:443"
      VEIL_RELAY_ADDRESSES: ${VEIL_RELAY_ADDRESSES:-veil.ams.konstruct.cc:443}
      # ICE_TLS_CERT_PATH / ICE_TLS_KEY_PATH: not set here — Caddy terminates TLS.
      # Set these only for deployments where gateway is exposed directly without Caddy.
    ports:
      # Port 9443 still exposed for legacy plain-obfs4 clients (no TLS wrapper).
      # New clients use port 443 via Caddy.
      - "9443:9443"
    volumes:
      - /opt/construct/secrets:/secrets:ro
    networks:
      - internal
    # Legacy plain-obfs4 is still reachable on direct port 9443 (host-exposed).

  # ─── SALAMANDER QUIC endpoint (construct-transport) ──────────────────────────
  # Receives obfuscated QUIC (SALAMANDER) on UDP 443, de-obfuscates and forwards
  # plain h2c to caddy:8080. Standard HTTP/3 (Caddy native) is NOT used — all
  # client QUIC traffic uses SALAMANDER obfuscation for anti-DPI.
  quic:
    image: ghcr.io/konstruct-msg/construct-transport:latest
    restart: unless-stopped
    env_file:
      - path: /opt/construct/secrets/app.env
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      QUIC_SAN: quic.konstruct.cc
      QUIC_UPSTREAM: "caddy:8080"
      QUIC_CERT_PATH: /certs/server-cert.der
      QUIC_KEY_PATH: /certs/server-key.der
    ports:
      - "443:443/udp" # SALAMANDER-obfuscated QUIC from clients
    networks:
      - internal
    volumes:
      - /opt/construct/quic-certs:/certs

volumes:
  postgres-data:
  redis-data:
  media-data:
  caddy-data:
  prometheus-data:
  grafana-data:

networks:
  internal:
    driver: bridge
