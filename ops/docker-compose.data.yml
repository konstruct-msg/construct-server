# =============================================================================
# Construct — Data Droplet
# Runs: PostgreSQL 16 + Redis
#
# Setup on data droplet:
#   1. git clone git@github.com:konstruct-msg/construct-server.git
#   2. cp ops/.env.data.example .env.data
#   3. nano .env.data  # fill in passwords
#   4. docker compose -f ops/docker-compose.data.yml --env-file .env.data up -d
#
# Firewall: allow app droplet IP on ports 5432 (Postgres) and 6379 (Redis)
#   ufw allow from APP_DROPLET_IP to any port 5432
#   ufw allow from APP_DROPLET_IP to any port 6379
# =============================================================================

name: construct-data

services:
  # ─── PostgreSQL 16 ───────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: construct-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: construct
      POSTGRES_USER: construct
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # accessible from app droplet (restrict via UFW)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U construct -d construct"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Redis ───────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: construct-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379" # accessible from app droplet (restrict via UFW)
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
