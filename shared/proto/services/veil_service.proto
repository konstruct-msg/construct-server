syntax = "proto3";

package shared.proto.services.v1;

// VeilService — выдача veil-front capability (подписанных токенов доступа).
//
// Модель (decisions/veil-ticket-provisioning-system.md, B2): тикет — это
// self-contained **backend-signed capability**. Backend (issuer) подписывает её
// своим Ed25519-ключом; релей хранит только публичный ключ и валидирует capability
// ОФЛАЙН (без стора, без синхронизации, без секретов на диске).
//
// Первая capability приходит OUT-OF-BAND (подписанный blob: QR / deep link); дальше
// клиент продлевает IN-BAND через IssueVeilCapability по уже поднятому VEIL-туннелю
// до истечения текущей.
//
// IssueVeilCapability — JWT-gated (требует валидную пользовательскую сессию;
// user_id берётся из метаданных x-user-id, проставленных gateway/envoy).
service VeilService {
  // Клиент → backend. Выдаёт свежую подписанную capability у истечения текущей.
  rpc IssueVeilCapability(IssueVeilCapabilityRequest) returns (IssueVeilCapabilityResponse);
}

message IssueVeilCapabilityRequest {
  // Релей (host:port), под который нужна capability. Backend выдаёт capability,
  // действительную в scope этого релея.
  string relay_address = 1;

  // ticket_id заменяемой capability (для учёта ротации). Опционально.
  bytes current_ticket_id = 2;

  // B1 (decisions/veil-ticket-provisioning-system.md): держателя публичный
  // Ed25519-ключ (32 байта). Если задан — backend выдаёт key-bound CapabilityV2
  // (AUTH v3), привязанную к этому ключу, вместо bearer-capability B2. Приватный
  // ключ никогда не передаётся backend'у. Обязателен при role = ROLE_RELAY.
  bytes veil_pk = 3;

  // B1: роль держателя — 0 = ROLE_USER (по умолчанию), 1 = ROLE_RELAY (цепочечный
  // релей, запрашивающий capability на upstream-релей, см.
  // decisions/veil-relay-topology.md §3/§4). Игнорируется, если veil_pk не задан.
  uint32 role = 4;
}

message IssueVeilCapabilityResponse {
  // Каноничный подписанный capability blob, который клиент скармливает veil_start
  // напрямую (base64 → store). Layout зависит от capability_version:
  //   v1 (B2, construct-veil-protocol::Capability::encode):
  //     ticket_id[16] || auth_key[32] || not_before[8 LE] || not_after[8 LE]
  //     || suite_id[1] || scope_len[u8] || scope || sig[64]
  //   v2 (B1, construct-veil-protocol::CapabilityV2::encode):
  //     ticket_id[16] || veil_pk[32] || role[1] || not_before[8 LE]
  //     || not_after[8 LE] || suite_id[1] || scope_len[u8] || scope || sig[64]
  bytes capability = 1;

  // Подтверждённые сетевые параметры релея — клиент обновляет пин/SNI по этому же
  // in-band каналу при ротации серта релея (без пересборки приложения).
  string relay_address = 2;
  string spki = 3; // hex SHA-256 SPKI pin
  string sni = 4;

  // Unix-время истечения — клиент планирует следующее продление.
  int64 not_after = 5;

  // Формат выданной capability: 1 = B2 (bearer, AUTH v2), 2 = B1 (key-bound, AUTH
  // v3). Зависит от того, был ли в запросе задан veil_pk.
  uint32 capability_version = 6;

  // EntryDirectory v1 (decisions/entry-directory-design.md, Source 1): пред-выданные
  // альтернативные входы. Каждый — самодостаточная связка {coords + capability} на
  // ДРУГОЙ релей, так что при блокировке основного фронта клиент переключается на
  // закешированную альтернативу БЕЗ раунд-трипа к мёртвому фронту (закрывает
  // chicken-egg: смена входа требует capability для него).
  //
  // Backend выдаёт ротируемое K-подмножество из N сконфигурированных релеев на
  // пользователя (Salmon-lite: server-side квота ограничивает enumeration). Пусто,
  // если сконфигурирован ≤1 релей. capability каждого выпущена тем же путём
  // (bearer/key-bound), что и основная — по наличию veil_pk в запросе.
  repeated EntryPoint alternates = 7;
}

// Один альтернативный вход: те же поля, что и в основном ответе, но для другого
// релея. Клиент кеширует их (VeilTicketStore) и ранжирует своим RelaySelector.
message EntryPoint {
  bytes capability = 1; // канонный подписанный blob (layout как в основном ответе)
  string relay_address = 2;
  string spki = 3; // hex SHA-256 SPKI pin
  string sni = 4;
  int64 not_after = 5;
  uint32 capability_version = 6;
}
