syntax = "proto3";

package shared.proto.services.v1;

// VeilService — выдача veil-front capability (подписанных токенов доступа).
//
// Модель (decisions/veil-ticket-provisioning-system.md, B2): тикет — это
// self-contained **backend-signed capability**. Backend (issuer) подписывает её
// своим Ed25519-ключом; релей хранит только публичный ключ и валидирует capability
// ОФЛАЙН (без стора, без синхронизации, без секретов на диске).
//
// Первая capability приходит OUT-OF-BAND (подписанный blob: QR / deep link); дальше
// клиент продлевает IN-BAND через IssueVeilCapability по уже поднятому VEIL-туннелю
// до истечения текущей.
//
// IssueVeilCapability — JWT-gated (требует валидную пользовательскую сессию;
// user_id берётся из метаданных x-user-id, проставленных gateway/envoy).
service VeilService {
  // Клиент → backend. Выдаёт свежую подписанную capability у истечения текущей.
  rpc IssueVeilCapability(IssueVeilCapabilityRequest) returns (IssueVeilCapabilityResponse);
}

message IssueVeilCapabilityRequest {
  // Релей (host:port), под который нужна capability. Backend выдаёт capability,
  // действительную в scope этого релея.
  string relay_address = 1;

  // ticket_id заменяемой capability (для учёта ротации). Опционально.
  bytes current_ticket_id = 2;
}

message IssueVeilCapabilityResponse {
  // Каноничный подписанный capability blob, который клиент скармливает veil_start
  // напрямую (base64 → store). Layout — construct-veil-protocol::Capability::encode:
  //   ticket_id[16] || auth_key[32] || not_before[8 LE] || not_after[8 LE]
  //   || suite_id[1] || scope_len[u8] || scope || sig[64]
  bytes capability = 1;

  // Подтверждённые сетевые параметры релея — клиент обновляет пин/SNI по этому же
  // in-band каналу при ротации серта релея (без пересборки приложения).
  string relay_address = 2;
  string spki = 3; // hex SHA-256 SPKI pin
  string sni = 4;

  // Unix-время истечения — клиент планирует следующее продление.
  int64 not_after = 5;
}
